<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSSD - Investigative Report Form</title>
    <!-- Library untuk export ke gambar -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #555;
            font-family: "Times New Roman", Times, serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        /* Tombol Navigasi */
        .controls {
            margin-bottom: 20px;
            position: sticky;
            top: 10px;
            z-index: 100;
        }

        .btn-export {
            padding: 10px 20px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .btn-export:hover { background-color: #2ecc71; }

        /* Kertas Dokumen */
        #report-paper {
            background-color: #fff;
            width: 210mm;
            min-height: 297mm;
            padding: 20mm;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .header h1 { margin: 0; font-size: 24px; text-transform: uppercase; }

        /* Baris Data */
        .row {
            display: flex;
            border-bottom: 1px solid #000;
            min-height: 35px;
            align-items: flex-start;
            padding: 5px 0;
        }

        .label {
            font-weight: bold;
            font-size: 13px;
            text-transform: uppercase;
            width: 180px;
            padding-top: 5px;
        }

        /* Editable Area (Solusi teks tidak terpotong) */
        .editable {
            flex-grow: 1;
            outline: none;
            font-family: "Courier New", Courier, monospace;
            font-size: 15px;
            padding: 5px;
            min-height: 25px;
            word-break: break-all; /* Teks akan turun jika terlalu panjang */
        }

        .editable:empty:before {
            content: attr(data-placeholder);
            color: #aaa;
        }

        /* Checkbox */
        .status-group { display: flex; gap: 15px; padding-top: 5px; }
        .status-item { display: flex; align-items: center; gap: 5px; font-size: 13px; font-weight: bold; cursor: pointer; }

        /* Bagian Besar (Narrative, Evidence, dll) */
        .section-box {
            margin-top: 15px;
            border: 1px solid #000;
        }

        .section-title {
            background: #eee;
            border-bottom: 1px solid #000;
            padding: 5px 10px;
            font-weight: bold;
            font-size: 13px;
            text-transform: uppercase;
        }

        .large-editable {
            min-height: 100px;
            padding: 10px;
            font-family: "Courier New", Courier, monospace;
            font-size: 14px;
            outline: none;
            background: white;
        }

        /* Footer */
        .footer {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            padding-top: 40px;
        }

        .sig-box { width: 250px; text-align: center; }
        .sig-line { border-top: 1px solid #000; margin-top: 30px; padding-top: 5px; font-weight: bold; font-size: 13px; }

        @media print {
            .controls { display: none; }
            body { background: none; padding: 0; }
            #report-paper { box-shadow: none; border: none; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <button class="btn-export" onclick="exportToPNG()">Export ke PNG</button>
    </div>

    <div id="report-paper">
        <div class="header">
            <h1>Investigative Report</h1>
            <p>LOS SANTOS SHERIFF DEPARTMENT - MAJOR CRIME BUREAU</p>
        </div>

        <div class="row">
            <div class="label">Primary Report:</div>
            <div class="editable" contenteditable="true" data-placeholder="IR-YYYYMMDD-hhmm"></div>
        </div>

        <div class="row">
            <div class="label">Incident Type:</div>
            <div class="editable" contenteditable="true"></div>
        </div>

        <div class="row">
            <div class="label">Status:</div>
            <div class="status-group">
                <label class="status-item"><input type="checkbox"> INITIAL</label>
                <label class="status-item"><input type="checkbox"> FOLLOW-UP</label>
                <label class="status-item"><input type="checkbox"> FINAL</label>
            </div>
        </div>

        <div class="row">
            <div class="label">Date & Time:</div>
            <div class="editable" contenteditable="true" data-placeholder="DD/MMM/YYYY - 00:00"></div>
        </div>

        <div class="section-box">
            <div class="section-title">Investigation (Suspect Info / DNA)</div>
            <div class="large-editable" contenteditable="true";"></div>
        </div>

        <div class="section-box">
            <div class="section-title">Location</div>
            <div class="large-editable" contenteditable="true" style="min-height: 50px;"></div>
        </div>

        <div class="section-box">
            <div class="section-title">Vehicle Observed</div>
            <div class="large-editable" contenteditable="true" style="min-height: 50px;"></div>
        </div>

        <div class="section-box">
            <div class="section-title">Item Observed</div>
            <div class="large-editable" contenteditable="true"></div>
        </div>

        <div class="section-box">
            <div class="section-title">Narrative Summary</div>
            <div class="large-editable" contenteditable="true" style="min-height: 250px;"></div>
        </div>

        <div class="section-box">
            <div class="section-title">Evidence</div>
            <div class="large-editable" contenteditable="true"></div>
        </div>

        <div class="footer">
            <div class="sig-box">
                <div class="editable" contenteditable="true" style="text-align: center; border-bottom: 1px solid #ccc; margin-bottom: 5px;" data-placeholder="Name/Rank"></div>
                <div class="sig-line">REPORTING DEPUTY</div>
            </div>
            <div class="sig-box">
                <div class="editable" contenteditable="true" style="text-align: center; border-bottom: 1px solid #ccc; margin-bottom: 5px;" data-placeholder="Name/Rank"></div>
                <div class="sig-line">SUPERVISOR</div>
            </div>
        </div>
    </div>

    <script>
        function exportToPNG() {
            const paper = document.getElementById('report-paper');
            
            // Memberikan sedikit delay agar UI siap
            html2canvas(paper, {
                scale: 2, // Meningkatkan resolusi gambar agar tajam
                useCORS: true,
                backgroundColor: "#ffffff"
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'LSSD-Report-' + new Date().getTime() + '.png';
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }
    </script>
</body>
</html>
